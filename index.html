<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ancient Jerusalem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@needle-tools/engine/dist/needle-engine.min.js"></script>
  </head>
  <body class="landing-page">
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="index.html">Ancient Jerusalem</a>
        <nav class="nav-links" aria-label="Primary navigation">
          <a href="map.html">Map View</a>
          <a href="Gallery.html">Location Gallery</a>
        </nav>
      </header>

      <main class="dashboard-layout">
        <aside class="left-column"></aside>
        <section class="content-column">
          <div class="hero-copy">
            <h1>Ancient Jerusalem</h1>
            <p>
              A visual journey through the streets and architecture of ancient
              Jerusalem, capturing the city's monumental scale and daily life at
              the height of its history.
            </p>
          </div>

          <section>
            <div id="featured-posts" class="featured-posts"></div>
          </section>
        </section>
        <aside class="map-column">
          <section class="map-card">
            <div class="map-card-header">
              <h2>3D Map</h2>
              <a class="expand-button" href="map.html" aria-label="Expand map panel">
                ⤢
              </a>
            </div>
            <div class="map-canvas" aria-label="Blank map preview">
              <div class="map-canvas-clip">
                <needle-engine src="assets/test.glb" camera-position="0 1 1" style="width:100%;height:120%;display:block;"></needle-engine>
              </div>
          </section>
        </aside>
      </main>
    </div>

    <script src="data.js"></script>

    <script>
      const container = document.getElementById("featured-posts");
      const featuredPosts = (window.ancientJerusalemPosts || []).filter((post) =>
        Array.isArray(post.tags) && post.tags.includes("featured")
      );

      container.innerHTML = featuredPosts
        .map(
          (post) => `
            <article class="post-card ${post.layout === "wide" ? "post-card-wide" : ""}">
              <img class="post-image" src="${post.image}" alt="${post.title}" />
              <div class="post-body">
                <h3>${post.title}</h3>
                <p>${post.excerpt}</p>
                <a class="post-link" href="${post.href}?id=${post.id}">
                  View <span aria-hidden="true">→</span>
                </a>
              </div>
            </article>
          `
        )
        .join("");

      const pageBody = document.body;
      const expandButton = document.querySelector(".expand-button");
      const topbar = document.querySelector(".topbar");

      if (expandButton) {
        const syncExpandedMapTop = () => {
          if (!topbar) {
            return;
          }

          const topbarBottom = topbar.getBoundingClientRect().bottom;
          pageBody.style.setProperty("--expanded-map-top", `${Math.ceil(topbarBottom + 12)}px`);
        };

        const setMapExpanded = (expanded) => {
          if (expanded && window.matchMedia("(max-width: 980px)").matches) {
            window.scrollTo({ top: 0, left: 0, behavior: "auto" });
          }

          pageBody.classList.toggle("map-expanded", expanded);
          expandButton.setAttribute("aria-expanded", String(expanded));
          expandButton.setAttribute(
            "aria-label",
            expanded ? "Collapse map panel" : "Expand map panel"
          );
          expandButton.textContent = expanded ? "✕" : "⤢";

          window.requestAnimationFrame(syncExpandedMapTop);
        };

        syncExpandedMapTop();
        window.addEventListener("resize", syncExpandedMapTop);

        expandButton.addEventListener("click", (event) => {
          event.preventDefault();
          setMapExpanded(!pageBody.classList.contains("map-expanded"));
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && pageBody.classList.contains("map-expanded")) {
            setMapExpanded(false);
          }
        });
      }

      // Sidebar rendering logic
      function renderSidebar(post) {
        const leftColumn = document.querySelector('.left-column');
        if (!leftColumn || !post) return;
        leftColumn.innerHTML = `
          <div class="sidebar-title">${post.title}</div>
          <div class="sidebar-era">${post.time || ''}</div>
          <div class="sidebar-tabs">
            <button class="sidebar-tab active" data-tab="history">HISTORY</button>
            <button class="sidebar-tab" data-tab="architecture">ARCHITECTURE</button>
            <button class="sidebar-tab" data-tab="timeline">TIMELINE</button>
            <button class="sidebar-tab" data-tab="artifacts">ARTIFACTS</button>
          </div>
          <div class="sidebar-desc-card" id="sidebar-tab-content"></div>
          <div class="sidebar-action">
            <button class="sidebar-action-btn"><span>⟳</span> Enter 360° View</button>
          </div>
        `;
        // Initial content
        renderSidebarTab(post, 'history');
        // Tab switching
        leftColumn.querySelectorAll('.sidebar-tab').forEach(btn => {
          btn.addEventListener('click', function() {
            leftColumn.querySelectorAll('.sidebar-tab').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            renderSidebarTab(post, this.dataset.tab);
          });
        });
        // Action button (customize as needed)
        leftColumn.querySelector('.sidebar-action-btn').addEventListener('click', () => {
          alert('360° View coming soon!');
        });
      }
      function typeText(element, text, speed = 5) {
        element.textContent = '';
        let i = 0;
        function type() {
          if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
            setTimeout(type, speed);
          }
        }
        type();
      }
      function renderSidebarTab(post, tab) {
        const content = document.getElementById('sidebar-tab-content');
        if (!content) return;
        if (tab === 'history') typeText(content, post.history || '');
        else if (tab === 'architecture') typeText(content, post.architecture || '');
        else if (tab === 'timeline') {
          content.innerHTML = (post.timeline || []).map(ev => `<div><b>${ev.date}:</b> ${ev.event}</div>`).join('');
        } else if (tab === 'artifacts') {
          content.innerHTML = (post.artifacts || []).map(a => `<div><b>${a.name}:</b> ${a.description}</div>`).join('');
        }
      }

      // Update left panel toggle logic to render sidebar
      const leftColumn = document.querySelector('.left-column');
      const dashboardLayout = document.querySelector('.dashboard-layout');
      function updateDashboardLayout() {
        if (leftColumn && dashboardLayout) {
          if (leftColumn.classList.contains('visible')) {
            dashboardLayout.classList.remove('no-left-column');
            dashboardLayout.classList.add('left-open');
          } else {
            dashboardLayout.classList.add('no-left-column');
            dashboardLayout.classList.remove('left-open');
          }
        }
      }
      // Update on toggle
      document.addEventListener('click', function(e) {
        const target = e.target.closest('.post-link');
        if (target) {
          e.preventDefault();
          if (leftColumn) {
            leftColumn.classList.toggle('visible');
            // Find the post by id
            const id = target.href.match(/id=(\d+)/);
            const postId = id ? parseInt(id[1], 10) : null;
            const post = (window.ancientJerusalemPosts || []).find(p => p.id === postId);
            if (leftColumn.classList.contains('visible')) {
              renderSidebar(post);
            } else {
              leftColumn.innerHTML = '';
            }
          }
          updateDashboardLayout();
        }
      });
      // Set initial state
      updateDashboardLayout();
    </script>
  </body>
</html>
